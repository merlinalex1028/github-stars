name: Daily Sync

on:
  schedule:
    # Run daily at 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Trigger sync endpoint
        run: |
          SYNC_URL="$(printf '%s' "${{ secrets.SYNC_URL }}" | tr -d '[:space:]')"
          SYNC_URL="${SYNC_URL%/api/sync}"
          while [[ "$SYNC_URL" == */ ]]; do
            SYNC_URL="${SYNC_URL%/}"
          done
          SYNC_URL="$SYNC_URL/api/sync"

          echo "Triggering sync endpoint: ${SYNC_URL#https://}"

          set +e
          HTTP_STATUS=$(curl -s -o /tmp/response.txt -w "%{http_code}" \
            -X POST "$SYNC_URL" \
            -H "Authorization: Bearer ${{ secrets.SYNC_SECRET }}" \
            -H "Content-Type: application/json" \
            --connect-timeout 10 \
            --max-time 180 \
            --retry 3 \
            --retry-delay 10)
          CURL_EXIT=$?
          set -e

          echo "HTTP Status: $HTTP_STATUS"
          echo "Response:"
          cat /tmp/response.txt || true
          echo ""

          if [ "$CURL_EXIT" -ne 0 ]; then
            echo "::error::curl failed with exit code $CURL_EXIT"
            exit "$CURL_EXIT"
          fi

          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "::error::Sync failed with HTTP status $HTTP_STATUS"
            exit 1
          fi

          SUCCESS=$(cat /tmp/response.txt | grep -o '"success":true' || true)
          if [ -z "$SUCCESS" ]; then
            echo "::error::Sync endpoint returned success=false"
            cat /tmp/response.txt
            exit 1
          fi

          echo "Sync completed successfully"
